<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Form</h1>
    <form action="">
        <label for="name">Name</label>
        <input type="text" name="name" id="name" placeholder="Enter your name"><br />
        <br><label for="email">Email</label>
        <input type="email" email="email" id="email" placeholder="Enter your Email" required><br />
        <br><label for="password">Password</label>
        <input type="password" password="password" id="password" placeholder="Required password"><br />
        <br><label for="contact no">Contact</label>
        <input type="contact no" contact no="contact no" id="contact no" placeholder="Enter the number"><br />
        <br>
        <label for="gender">Gender</label>
        <br><label for="male">male</label>
        <input type="radio" name="gender" id="male"><br />
        <label for="female">Female</label>
        <input type="radio" name="gender" id="female"><br />

        <br><input type="submit" value="submit">
        <button type="reset" value="reset">Reset</button>
    </form>
</body>

</html>
