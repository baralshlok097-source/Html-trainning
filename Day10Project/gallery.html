<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Budhanilkantha Secondary English School</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f8ff;
        }

        /* Header */

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: #003366;
            color: white;
            padding: 20px;
        }

        .header img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid white;
        }

        .header h1 {
            font-size: 35px;
        }

        /* Gallery Heading */

        .gallery-title {
            text-align: center;
            margin: 30px;
        }

        .gallery-title h2 {
            color: #003366;
            font-size: 35px;
        }

        .gallery-title p {
            font-size: 18px;
            color: #555;
            margin-top: 10px;
        }

        /* Gallery */

        .gallery {
            width: 90%;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .gallery img {
            width: 100%;
            height: 230px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Footer */

        footer {
            background: #003366;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            color: white;
            text-align: center;
            gap: 10px;
            padding: 15px;
            margin: 20px;
        }

        nav a {
            text-decoration:none;
            color:#131415;
            font-weight:bold;
            padding: 20px;
            margin: 25px;
            border:2px solid #0a0b0b;
            border-radius:5px;
            transition: 0.3s;
        }

        nav a:hover {
            color:rgb(238, 238, 233);
            background:#003366;
            border:2px solid #71bc71;
        }
    </style>

</head>

<body>

    <div class="header">

        <img id="hover" src="Budhanilkantha.jpg" alt="School Logo">

        <h1>Budhanilkantha Sec. Eng. School</h1>

    </div>
    <nav>
        <a href="Main page.html">Menu</a>
        <a href="Wbsite.html">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="Contact.html">Contact</a>
    </nav>

    <div class="gallery-title">

        <h2>School Gallery</h2>

        <p>
            Explore our campus, classrooms, laboratories, sports activities,
            and memorable events.
        </p>

    </div>

    <div class="gallery">

        <img src="Fromfront.jpg" alt="Campus">

        <img src="Campus.jpg" alt="Ground">

        <img src="Computer.jpg" alt="Computer Lab">

        <img src="Science.jpg" alt="Science Lab">

        <img src="Event.jpeg" alt="School Event">

    </div>

    <footer>

        <p>
            © 2026 Budhanilkantha Secondary English School |
            Shankarpur, Biratnagar-2, Morang, Nepal
        </p>

    </footer>
    <script>
        const img= document.getElementById("hover");

        const originalsrc = "Budhanilkantha.jpg";
        const hoversrc = "campus.jpg";

        img.addEventListener('mouseover', () =>{img.src = hoversrc;});
        img.addEventListener('mouseout', ()=> {img.src = originalsrc;});  
    </script>
</body>

</html>
