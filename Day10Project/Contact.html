<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f8ff;
        }

        /* Header */

        .header{
            display:flex;
            align-items:center;
            gap:20px;
            background:#003366;
            color:white;
            padding:20px 40px;
        }

        .header img{
            width:90px;
            height:90px;
            border-radius:50%;
            border:3px solid white;
        }
        .header img:hover{
            border-radius: 50%;
         }

        .header h1{
            font-size:35px;
        }

        /* Contact Box */

        .contact{
            width:70%;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        .contact h2{
            text-align:center;
            color:#003366;
            margin-bottom:20px;
        }

        label{
            font-weight:bold;
        }

        input,
        textarea{
            width:100%;
            padding:10px;
            margin:10px 0 20px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        textarea{
            height:120px;
            resize:none;
        }

        button{
            width:100%;
            padding:12px;
            background:#003366;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#0055aa;
        }

        /* School Information */

        .info{
            margin-top:30px;
            background:#eef4ff;
            padding:20px;
            border-radius:8px;
        }

        .info h3{
            color:#003366;
            margin-bottom:15px;
        }

        .info p{
            font-size:18px;
            line-height:1.8;
        }
        nav{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-top:20px;
        }
        nav a{
            text-decoration:none;
            color:#003366;
            font-weight:bold;
            padding:10px 20px;
            border:2px solid #003366;
            border-radius:5px;
            transition:0.3s;
            
       }
        nav a:hover{
            background:#003366;
            color:white;
            border:2px solid #11ff2f;
        }
        @media (max-width:480px){

    .header h1{
        font-size:22px;
    }

    .header img{
        width:70px;
        height:70px;
    }

    .contact{
        width:95%;
    }

    nav a{
        font-size:16px;
        padding:10px;
    }

}
    </style>

</head>

<body>

    <div class="header">

        <img id="hover" src="Budhanilkantha.jpg" alt="School Logo">

        <h1>Budhanilkantha Sec. Eng. School</h1>

    </div>
    <nav>
        <a href="Main page.html">Menu</a>
        <a href="Wbsite.html">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="Contact.html">Contact</a>
    </nav>

    <div class="contact">

        <h2>Contact Us</h2>

        <form>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name">

            <label>Email</label>
            <input type="email" placeholder="Enter your email">

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number">

            <label>Message</label>
            <textarea placeholder="Write your message here..."></textarea>

            <button type="submit">Send Message</button>

        </form>

        <div class="info">

            <h3>School Contact Information</h3>

            <p><strong>📍 Address:</strong> Shankarpur, Biratnagar-2, Morang, Nepal</p>

            <p><strong>📞 Phone:</strong> +977-XXXXXXXXXX</p>

            <p><strong>✉ Email:</strong> info@budhanilkantha.edu.np</p>

            <p><strong>🌐 Website:</strong> www.budhanilkantha.edu.np</p>

        </div>

    </div>
    <script>
        const img= document.getElementById("hover");

        const originalsrc = "Budhanilkantha.jpg";
        const hoversrc = "campus.jpg";

        img.addEventListener('mouseover', () =>{img.src = hoversrc;});
        img.addEventListener('mouseout', ()=> {img.src = originalsrc;});  
    </script>

</body>

</html>
