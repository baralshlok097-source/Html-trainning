<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himalaya Academy - Gallery</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        /* Navigation Bar */
        nav {
            background: #003366;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
        }

        .logo {
            color: white;
            font-size: 30px;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 25px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        nav ul li a:hover {
            color: yellow;
        }

        /* Gallery Heading */
        .heading {
            text-align: center;
            padding: 40px;
        }

        .heading h1 {
            color: #003366;
            font-size: 40px;
        }

        .heading p {
            margin-top: 10px;
            color: #666;
            font-size: 18px;
        }

        /* Gallery Section */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 30px 60px;
        }

        .gallery img {
            width: 100%;
            height: 220px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            background: #003366;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
        }
    </style>

</head>

<body>

    <nav>

        <div class="logo">Himalaya Academy</div>

        <ul>
            <li><a href="about.html">Home</a></li>
            <li><a href="test.html">Courses</a></li>
            <li><a href="Gmail/gmail.html">Gallery</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

    </nav>

    <div class="heading">
        <h1>Our Gallery</h1>
        <p>Explore our classrooms, students, and campus activities.</p>
    </div>

    <div class="gallery">

        <img src="sshk;.jpg" alt="Campus">

        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=600" alt="Students">

        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600" alt="Computer Lab">

        <img src="https://images.unsplash.com/photo-1497486751825-1233686d5d80?w=600" alt="Classroom">

        <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7?w=600" alt="Training">

        <img src="https://images.unsplash.com/photo-1513258496099-48168024aec0?w=600" alt="Graduation">

        <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=600" alt="Workshop">

        <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=600" alt="Students">
    </div>

    <footer>
        <p>© 2026 Himalaya Academy | All Rights Reserved</p>
    </footer>

</body>

</html>
