<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background-color: blue;
            border: 2px;
            height: 200px;
            width: 200px;
            margin: 10px;
            min-width: 20px;
        }
        .container{
            font-display: block;
        }
        @media(max-width:6000px){
            .body{
                background-color: rgb(83, 181, 181);
            }
            .box{
                background-color: hwb(0 83% 15% / 0);
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
